services:
  fcp-sfd-object-processor:
    build:
      target: development
    image: fcp-sfd-object-processor-development
    container_name: fcp-sfd-object-processor-development
    links:
      - "floci:floci"
    depends_on:
      floci-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
    volumes:
      - ./src/:/home/node/src
      - ./package.json:/home/node/package.json
    environment:
      NODE_ENV: development
      CDP_UPLOADER_URL: ${CDP_UPLOADER_URL:-http://cdp-uploader:7337}
      CDP_UPLOADER_INITIATE_ENDPOINT: ${CDP_UPLOADER_INITIATE_ENDPOINT:-/initiate}
      CDP_UPLOADER_STATUS_ENDPOINT: ${CDP_UPLOADER_STATUS_ENDPOINT:-/status}
      CDP_UPLOADER_S3_BUCKET: ${CDP_UPLOADER_S3_BUCKET:-fcp-sfd-object-processor-bucket}
      CDP_UPLOADER_S3_PATH: ${CDP_UPLOADER_S3_PATH:-scanned}
      CDP_UPLOADER_CALLBACK_URL: ${CDP_UPLOADER_CALLBACK_URL:-http://fcp-sfd-object-processor:3004/api/v1/callback}
      CDP_UPLOADER_MIME_TYPES: ${CDP_UPLOADER_MIME_TYPES:-image/png,image/jpeg,image/gif,image/tiff,application/pdf,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.ms-excel.sheet.macroEnabled.12,application/vnd.openxmlformats-officedocument.presentationml.presentation,application/vnd.ms-word.document.macroEnabled.12}
      CDP_UPLOADER_DOCUMENT_TYPES: ${CDP_UPLOADER_DOCUMENT_TYPES:-Business_Structure_Change,CS_Agreement_Amendment,CS_Revenue_Claim_Amendment,CS_Facilitation_Fund_Amendment,ES_Agreement_Amendment,Delinked_Amendment,GS_Calf_Housing_Amendment,GS_FETF_Amendment,GS_GHE_Amendment,GS_IFP_Amendment,GS_Laying_Hens_Amendment,GS_SAF_Amendment,GS_SIG_Amendment,GS_TSRS_Amendment,GS_Water_Management_Amendment,GS_WRF_Amendment,ES_Claim,GS_Adding_Value_Claim,GS_Calf_Housing_Claim,GS_FETF_Claim,GS_GHE_Claim,GS_IFP_Claim,GS_Laying_Hens_Claim,GS_SAF_Claim,GS_SIG_Claim,GS_TSRS_Claim,GS_Water_Management_Claim,GS_WRF_Claim,CS_Application_Declaration,GS_SIG_Declaration,CS_Application_Evidence,CS_Agreement_Evidence,CS_Revenue_Claim_Evidence,CS_Capital_Claim_Evidence,CS_Facilitation_Fund_Evidence,SFI_Pilot_Evidence,SFI23_Evidence,SFI_Expanded_Offer_Evidence,ES_Claim_Evidence,Delinked_Evidence,Probate_Evidence,Complaint_Evidence,Appeal_Evidence,GS_Adding_Value_Evidence,GS_Calf_Housing_App_Form,GS_Calf_Housing_App_Evidence,GS_Calf_Housing_AEL&D_Form,GS_Calf_Housing_AEL&D_Evidence,GS_Calf_Housing_Grant_Fund_Agg,GS_Calf_Housing_Claim_Evidence,GS_FETF_Grant_Fund_Agg,GS_FETF_Claim_Evidence,GS_GHE_Claim_Evidence,GS_IFP_Grant_Fund_Agg,GS_IFP_Claim_Evidence,GS_Laying_Hens_App_Form,GS_Laying_Hens_App_Evidence,GS_Laying_Hens_Grant_Fund_Agg,GS_Laying_Hens_Claim_Evidence,GS_SAF_Claim_Evidence,GS_SIG_App_General,GS_SIG_App_Evidence,GS_SIG_SSL&D_Form,GS_SIG_SSL&D_Evidence,GS_SIG_Grant_Fund_Agg,GS_SIG_Claim_Evidence,GS_TSRS_Claim_Evidence,GS_Water_Management_Claim_Evidence,GS_WRF_Claim_Evidence,CS_HT_APP_Evidence_No_Maps,CS_HT_APP_Evidence_Includes_Maps}
      CDP_UPLOADER_MAX_FILE_SIZE: ${CDP_UPLOADER_MAX_FILE_SIZE:-10485760}
      CDP_UPLOADER_TIMEOUT_MS: ${CDP_UPLOADER_TIMEOUT_MS:-30000}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:3004}
      # Database
      MONGO_URI: mongodb://mongodb:27017/?replicaSet=rs0
      MONGO_READ_PREFERENCE: primary
      MONGO_OUTBOX_QUERY_LIMIT: ${MONGO_OUTBOX_QUERY_LIMIT:-100}
      # Outbox
      OUTBOX_MAX_ATTEMPTS: ${OUTBOX_MAX_ATTEMPTS:-5}
      # aws
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_S3_FORCE_PATH_STYLE: true
      S3_ENDPOINT: http://floci:4566
      SNS_ENDPOINT: http://floci:4566
      # Messaging
      DOCUMENT_UPLOAD_EVENTS_TOPIC_ARN: arn:aws:sns:eu-west-2:000000000000:fcp_sfd_object_processor_events
      AUDIT_TOPIC_ARN: arn:aws:sns:eu-west-2:000000000000:fcp_audit_fcp_sfd_object_processor
      ENVIRONMENT: ${ENVIRONMENT:-local}
      # Auth
      AUTH_ENTRA_ENABLED: ${AUTH_ENTRA_ENABLED:-false}
      # Multi-tenant Entra configuration (JSON array). Example:
      # AUTH_ENTRA_TENANTS='[{"tenantId":"defra-dev-tenant-id","allowedGroupIds":["group-a"]},{"tenantId":"defra-tenant-id","allowedGroupIds":["group-b"]}]'
      AUTH_ENTRA_TENANTS: ${AUTH_ENTRA_TENANTS}
      AUTH_COGNITO_ENABLED: ${AUTH_COGNITO_ENABLED:-false}
      AUTH_COGNITO_TOKEN_URL: ${AUTH_COGNITO_TOKEN_URL}
      AUTH_COGNITO_USER_POOL_ID: ${AUTH_COGNITO_USER_POOL_ID}
      AUTH_COGNITO_CLIENT_IDS: ${AUTH_COGNITO_CLIENT_IDS}
      # Grafana Metrics
      ENABLE_METRICS: ${ENABLE_METRICS:-true}
      AWS_EMF_ENVIRONMENT: Local
    networks:
      - fcp-sfd

  redis:
    image: redis:7.2.3-alpine3.18
    networks:
      - fcp-sfd

  cdp-uploader:
    image: defradigital/cdp-uploader:latest
    depends_on:
      floci-init:
        condition: service_completed_successfully
    env_file:
      - 'compose/aws.env'
    environment:
      VIRTUAL_HOST: ~^uploader\..*\.sslip\.io
      VIRTUAL_PATH: /
      VIRTUAL_PORT: 7337
      PORT: 7337
      NODE_ENV: development
      REDIS_HOST: redis
      USE_SINGLE_INSTANCE_CACHE: true
      MOCK_VIRUS_SCAN_ENABLED: true
      MOCK_VIRUS_RESULT_DELAY: 3
      SQS_ENDPOINT: http://floci:4566
      S3_ENDPOINT: http://floci:4566
      CONSUMER_BUCKETS: fcp-sfd-object-processor-bucket
    networks:
      - fcp-sfd

  floci:
    image: floci/floci:1.5.29
    environment:
      FLOCI_HOSTNAME: floci
      FLOCI_DEFAULT_REGION: ${AWS_REGION:-eu-west-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
    volumes:
      - floci-data:/app/data
    networks:
      - fcp-sfd

  floci-init:
    image: amazon/aws-cli:latest
    entrypoint: /bin/sh
    command: /setup/init.sh
    depends_on:
      floci:
        condition: service_started
    environment:
      AWS_ENDPOINT_URL: http://floci:4566
      AWS_REGION: ${AWS_REGION:-eu-west-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
    volumes:
      - ./floci/init.sh:/setup/init.sh
    networks:
      - fcp-sfd

  mongodb:
    image: mongo:8.2.11
    command: --replSet rs0 --bind_ip_all --port 27017
    attach: false
    healthcheck:
      test: test $$(mongosh --port 27017 --quiet --eval "try {rs.initiate({_id:'rs0',members:[{_id:0,host:\"mongodb:27017\"}]})} catch(e) {rs.status().ok}") -eq 1
      interval: 10s
      start_period: 10s
    networks:
      - fcp-sfd
    volumes:
      - mongodb-data:/data

volumes:
  mongodb-data:
  floci-data:

networks:
  fcp-sfd:
    driver: bridge
    name: fcp-sfd
