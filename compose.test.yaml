services:
  fcp-sfd-object-processor:
    build:
      target: development
    image: fcp-sfd-object-processor-development
    container_name: fcp-sfd-object-processor-test
    command: npm run test
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 3004
      NODE_ENV: development
      LOCALSTACK_ENDPOINT: http://localstack:4566
      MONGO_URI: mongodb://mongodb:27017/
      AUTH_ENTRA_ENABLED: ${AUTH_ENTRA_ENABLED:-false}
      AUTH_ENTRA_TENANT_ID: ${AUTH_ENTRA_TENANT_ID}
      AUTH_ENTRA_ALLOWED_GROUP_IDS: ${AUTH_ENTRA_ALLOWED_GROUP_IDS}
      AUTH_COGNITO_ENABLED: ${AUTH_COGNITO_ENABLED:-false}
      AUTH_COGNITO_TOKEN_URL: ${AUTH_COGNITO_TOKEN_URL}
      AUTH_COGNITO_USER_POOL_ID: ${AUTH_COGNITO_USER_POOL_ID}
      AUTH_COGNITO_CLIENT_IDS: ${AUTH_COGNITO_CLIENT_IDS}
    volumes:
      - ./src/:/home/node/src
      - ./test/:/home/node/test
      - ./package.json:/home/node/package.json 
      - ./coverage:/home/node/coverage
    depends_on:
    - mongodb
    - cdp-uploader
    - redis


  localstack:
    env_file:
      - path: .env
        required: false