version: 2

updates:
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 5
    groups:
      docker-security:
        applies-to: security-updates
        patterns:
          - "*"
      docker-non-security:
        applies-to: version-updates
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "chore"
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
      npm-production:
        applies-to: version-updates
        dependency-type: "production"
        patterns:
          - "*"
      npm-development:
        applies-to: version-updates
        dependency-type: "development"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    groups:
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"
      github-actions-non-security:
        applies-to: version-updates
        patterns:
          - "*"